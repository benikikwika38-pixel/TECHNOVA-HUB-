<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificat - TechNova Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.certificate{
max-width:900px;
width:100%;
background:white;
color:#111;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.25);
border:8px solid #2563eb;
position:relative;
overflow:hidden;
}
.badge{
display:inline-block;
padding:10px 20px;
border-radius:50px;
background:#eef2ff;
color:#4f46e5;
font-size:16px;
font-weight:700;
margin-bottom:20px;
  }
.logo{
font-size:32px;
font-weight:800;
background:linear-gradient(90deg,#2563eb,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:15px;
}

.title{
font-size:48px;
font-weight:800;
color:#111827;
margin-bottom:20px;
letter-spacing:2px;
text-transform:uppercase;
}

.subtitle{
font-size:18px;
margin-bottom:30px;
}

..name{
font-size:42px;
font-weight:800;
color:#4f46e5;
margin:25px 0;
padding-bottom:10px;
border-bottom:3px solid #4f46e5;
display:inline-block;
word-break:break-word;
}

.course{
font-size:28px;
font-weight:700;
color:#2563eb;
margin:25px 0;
  }

.id{
margin-top:20px;
font-size:14px;
color:#555;
}

.signature{
margin-top:50px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
}

.sign-box{
text-align:center;
}

.line{
width:220px;
height:2px;
background:#111;
margin-bottom:10px;
}

.actions{
margin-top:40px;
text-align:center;
}

.btn{
padding:14px 25px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-weight:600;
cursor:pointer;
margin:10px;
}

.back{
text-decoration:none;
}

@media print{

.actions{
display:none;
}

body{
background:white;
}
@media print{
}

</style>
</head>

<body>

<div>

<div class="certificate">

<div class="logo">
🚀 TechNova Hub
</div>

<h1 class="title">
🏆 CERTIFICAT DE RÉUSSITE
<div style="
display:inline-block;
padding:10px 20px;
background:#eef2ff;
color:#4f46e5;
border-radius:50px;
font-weight:700;
margin-bottom:25px;
">
<div class="badge">
⭐ Excellence Académique
</div>
<div id="formulaire">

<input
type="text"
id="nomInput"
placeholder="Nom complet"
style="
width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
">

<input
type="text"
id="formationInput"
placeholder="Formation suivie"
style="
width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
">

<button
onclick="genererCertificat()"
class="btn">
🎓 Générer le certificat
</button>

</div>

<div id="certificat" style="display:none;">

<p class="subtitle">
Décerné à
</p>

<div class="name" id="nomAffiche"></div>

<p>
Pour avoir terminé avec succès la formation :
</p>

<div class="course" id="formationAffiche"></div>

<p>
Avec engagement, discipline et excellence.
</p>

</div>

<div class="id">
Date : <span id="dateCert"></span>
</div>
<div class="id">
ID Certificat : <span id="certId"></span>
</div>

<div class="signature">

<div class="sign-box">
<div class="line"></div>
<p><strong>Béni Kikwika</strong></p>
<p>Fondateur & CEO</p>
</div>

<div class="sign-box">
<div class="line"></div>
<p>TechNova Hub</p>
<p>Certification</p>
</div>

</div>

</div>

<div class="actions">

<button class="btn" onclick="window.print()">
📥 Télécharger PDF
</button>

<a href="dashboard.html" class="back">
<button class="btn">
⬅ Retour Dashboard
</button>
</a>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADpfbXDg9Sr9sa-y9ImIydodzvQqUOpDU",
  authDomain: "technova-hub-a6133.firebaseapp.com",
  projectId: "technova-hub-a6133",
  storageBucket: "technova-hub-a6133.firebasestorage.app",
  messagingSenderId: "858060696573",
  appId: "1:858060696573:web:8f62c54a7e798bce230794"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

const docRef = doc(db,"users",user.uid);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){
document.getElementById("nom").textContent =
docSnap.data().nom;
}else{
document.getElementById("nom").textContent =
user.email;
}

});

</script>
<script>

function genererCertificat(){

const nom =
document.getElementById("nomInput").value;

const formation =
document.getElementById("formationInput").value;

if(nom==="" || formation===""){
alert("Remplissez tous les champs");
return;
}
const certificatID =
"TH-2026-" + Math.floor(Math.random()*100000);

document.getElementById("certId").textContent =
certificatID;
document.getElementById("nomAffiche").textContent = nom;

document.getElementById("formationAffiche").textContent = formation;

document.getElementById("certificat").style.display = "block";

document.getElementById("formulaire").style.display = "none";
document.getElementById("dateCert").textContent =
new Date().toLocaleDateString("fr-FR");
}

</script>
</body>
</html>
