<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Profil - TechNova Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
padding:20px;
}

.profile-card{
max-width:700px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
}

.profile-card h1{
margin-bottom:20px;
}

.info{
margin:15px 0;
padding:15px;
background:rgba(255,255,255,.05);
border-radius:12px;
}

.back-btn{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
text-decoration:none;
border-radius:12px;
}

</style>
</head>

<body>

<div class="profile-card">

<h1>👤 Mon Profil</h1>
<input type="file" id="photoInput" accept="image/*">

<<img
src="IMG-20260605-WA0010.jpg"
alt="Photo de profil"
style="
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #60a5fa;
display:block;
margin:20px auto;
">
<div class="info">
<strong>Nom :</strong>
<span id="nom">Chargement...</span>
</div>

<div class="info">
<strong>Email :</strong>
<span id="email">Chargement...</span>
</div>

<div class="info">
<strong>UID :</strong>
<span id="uid">Chargement...</span>
</div>

<a href="dashboard.html" class="back-btn">
⬅ Retour Dashboard
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADpfbXDg9Sr9sa-y9ImIydodzvQqUOpDU",
  authDomain: "technova-hub-a6133.firebaseapp.com",
  projectId: "technova-hub-a6133",
  storageBucket: "technova-hub-a6133.firebasestorage.app",
  messagingSenderId: "858060696573",
  appId: "1:858060696573:web:8f62c54a7e798bce230794"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

document.getElementById("email").textContent = user.email;
document.getElementById("uid").textContent = user.uid;

const docRef = doc(db,"users",user.uid);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){
document.getElementById("nom").textContent =
docSnap.data().nom;
}

});

</script>

</body>
</html>
