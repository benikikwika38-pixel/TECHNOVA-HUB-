<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - TechNova Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:#4f46e5;
border-radius:50%;
filter:blur(120px);
top:-100px;
left:-100px;
opacity:.5;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#2563eb;
border-radius:50%;
filter:blur(120px);
bottom:-100px;
right:-100px;
opacity:.5;
}

.register-box{
width:420px;
max-width:90%;
background:rgba(255,255,255,.05);
padding:40px;
border-radius:25px;
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(20px);
position:relative;
z-index:10;
transition:.3s;
}

.register-box:hover{
transform:translateY(-5px);
box-shadow:0 15px 40px rgba(96,165,250,.25);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
outline:none;
}

input::placeholder{
color:#94a3b8;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(96,165,250,.4);
}

.link{
text-align:center;
margin-top:20px;
}

.link a{
color:#60a5fa;
text-decoration:none;
}

</style>
</head>

<body>

<div class="register-box">

<h1>Inscription</h1>

<p class="subtitle">
Créer votre compte TechNova Hub
</p>

<input type="text" id="name" placeholder="Nom complet">

<input type="email" id="email" placeholder="Adresse email">

<input type="password" id="password" placeholder="Mot de passe">

<input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe">

<button onclick="register()">S'inscrire</button>

<div class="link">
Déjà un compte ?
<a href="login.html">Se connecter</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADpfbXDg9Sr9sa-y9ImIydodzvQqUOpDU",
  authDomain: "technova-hub-a6133.firebaseapp.com",
  projectId: "technova-hub-a6133",
  storageBucket: "technova-hub-a6133.firebasestorage.app",
  messagingSenderId: "858060696573",
  appId: "1:858060696573:web:8f62c54a7e798bce230794",
  measurementId: "G-BJVHYW26SH"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.register = async function(){

const name = document.getElementById("name").value;

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

if(name === ""){
alert("Veuillez saisir votre nom complet");
return;
}

if(email === ""){
alert("Veuillez saisir votre adresse email");
return;
}

if(password.length < 6){
alert("Le mot de passe doit contenir au moins 6 caractères");
return;
}

if(password !== confirmPassword){
alert("Les mots de passe ne correspondent pas");
return;
}

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;

await setDoc(
doc(db,"users",user.uid),
{
nom:name,
email:email,
dateCreation:new Date().toISOString()
}
);

alert("Compte créé avec succès !");

window.location.href = "login.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
